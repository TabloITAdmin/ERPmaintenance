<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 560px;
      background: rgba(255,255,255,0.08);
      padding: 32px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    h1 {
      margin-bottom: 12px;
    }
    p {
      margin: 0;
      color: rgba(255,255,255,0.82);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>System Under Maintenance</h1>
    <p>We are currently updating TRC mini ERP. Please check back shortly.</p>
  </div>
</body>
</html>
